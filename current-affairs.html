<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Current Affairs — PrepSaathi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0d1b2a;--navy2:#1b2d42;--saffron:#e87722;--saffron2:#f59530;
  --gold:#c9a84c;--gold2:#e8c97a;--white:#f8f5ef;--white2:#ede8df;
  --green:#22723a;--green-bg:#e8f5ed;--red:#c0392b;--red-bg:#fdecea;
  --muted:#7a8694;--border:#e8e0d4;--shadow:0 8px 32px rgba(13,27,42,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--white);font-family:'Source Sans 3',sans-serif;color:var(--navy);padding-top:112px;}

/* LANG BAR */
.lang-bar{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--navy);padding:0 24px;height:48px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,0.25);}
.lang-brand{display:flex;align-items:center;gap:10px;color:var(--gold2);font-size:15px;font-weight:700;}
.lang-switch{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:24px;padding:4px 6px;}
.lang-btn{padding:4px 14px;border-radius:20px;border:none;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all 0.2s;font-family:inherit;}
.lang-btn.active{background:var(--saffron);color:white;}
.lang-btn:not(.active){background:transparent;color:rgba(255,255,255,0.6);}

/* NAVBAR */
.site-header{position:fixed;top:48px;left:0;right:0;z-index:999;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 max(24px,4vw);height:64px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,0.07);}
.nav-logo{display:flex;align-items:center;gap:10px;}
.nav-logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--saffron),var(--saffron2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.nav-logo-text strong{display:block;font-size:15px;color:var(--navy);font-weight:700;}
.nav-logo-text small{font-size:11px;color:var(--muted);letter-spacing:1px;}
.header-back{font-size:13px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);font-weight:600;transition:all 0.15s;}
.header-back:hover{background:var(--white2);color:var(--navy);}

.container{max-width:900px;margin:0 auto;padding:32px 20px 60px;}

/* LOADING */
.loading-card{background:white;border-radius:14px;border:1.5px solid var(--border);padding:60px 32px;text-align:center;box-shadow:var(--shadow);}
.spinner{width:48px;height:48px;border:4px solid var(--white2);border-top-color:var(--saffron);border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-card h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--navy);margin-bottom:8px;}
.loading-card p{color:var(--muted);font-size:14px;}
.loading-steps{display:flex;flex-direction:column;gap:8px;margin-top:20px;text-align:left;max-width:320px;margin-left:auto;margin-right:auto;}
.loading-step{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);}
.loading-step.done{color:var(--green);}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--white2);flex-shrink:0;}
.loading-step.done .step-dot{background:var(--green);}
.loading-step.active .step-dot{background:var(--saffron);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ERROR */
.error-card{background:var(--red-bg);border:1.5px solid #f5c6c0;border-radius:14px;padding:32px;text-align:center;}
.error-card h3{color:var(--red);font-size:18px;margin-bottom:8px;}
.error-card p{color:#8b2020;font-size:14px;margin-bottom:20px;}
.btn-retry{background:var(--red);color:white;border:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}

/* DATE BANNER */
.date-banner{background:linear-gradient(135deg,var(--navy2),var(--navy));border-radius:14px;padding:24px 28px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;border-left:5px solid var(--saffron);}
.date-banner h2{font-family:'Playfair Display',serif;font-size:clamp(18px,3vw,26px);color:var(--white);margin-bottom:4px;}
.date-banner p{font-size:13px;color:var(--gold2);}
.date-pills{display:flex;gap:8px;flex-wrap:wrap;}
.date-pill{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8);font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;}

/* SECTION LABEL */
.section-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* SUMMARY */
.summary-card{background:white;border-radius:14px;border:1.5px solid var(--border);padding:28px;margin-bottom:28px;box-shadow:var(--shadow);}
.summary-text{font-size:15px;line-height:1.9;color:#2a3a4a;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border);font-family:'Source Sans 3',sans-serif;}
.summary-text.devanagari{font-family:'Noto Sans Devanagari',sans-serif;font-size:14px;line-height:2.2;}
.source-note{font-size:11px;color:var(--muted);margin-top:16px;font-style:italic;}

/* BREAKDOWN GRID */
.breakdown-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.breakdown-item{background:var(--white);border-radius:10px;border:1.5px solid var(--border);padding:16px 18px;}
.breakdown-item h4{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.breakdown-item .item-text{font-size:13px;line-height:1.7;color:#3a4a5a;font-family:'Source Sans 3',sans-serif;}
.breakdown-item .item-text.devanagari{font-family:'Noto Sans Devanagari',sans-serif;font-size:12.5px;line-height:2;}
.tag-polity h4{color:#2c4cc0;}.tag-economy h4{color:#8b1a1a;}.tag-env h4{color:#1a6655;}
.tag-ir h4{color:#8b4000;}.tag-science h4{color:#5a1ab5;}.tag-governance h4{color:#2a5a2a;}
.tag-history h4{color:#8b4500;}.tag-geography h4{color:#1a6630;}.tag-culture h4{color:#6b1a6b;}

/* STATIC CONNECT */
.static-connect-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:32px;}
.static-card{background:white;border-radius:12px;border:1.5px solid #e0d4f5;padding:18px 20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);border-left:4px solid #7c3aed;}
.static-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.static-icon{font-size:18px;}
.static-subject{font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:4px;text-transform:uppercase;}
.static-subject.tag-polity{background:#e8eeff;color:#2c4cc0;}
.static-subject.tag-economy{background:#fce8e8;color:#8b1a1a;}
.static-subject.tag-env{background:#e0f4f0;color:#1a6655;}
.static-subject.tag-ir{background:#fff0e8;color:#8b4000;}
.static-subject.tag-science{background:#f0e8ff;color:#5a1ab5;}
.static-subject.tag-history{background:#fef0e0;color:#8b4500;}
.static-subject.tag-geography{background:#e0f5e8;color:#1a6630;}
.static-subject.tag-culture{background:#f5e8ff;color:#6b1a6b;}
.static-news{font-size:13px;color:#4a5a6a;line-height:1.6;margin-bottom:10px;padding-bottom:10px;border-bottom:1px dashed #e0d4f5;}
.static-link{font-size:13px;color:#5a3a8a;line-height:1.6;font-weight:600;}
.static-news.devanagari,.static-link.devanagari{font-family:'Noto Sans Devanagari',sans-serif;font-size:12.5px;line-height:1.9;}
.hl-tag.tag-culture{background:#f5e8ff;color:#6b1a6b;}

/* HIGHLIGHTS */
.highlights-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:32px;}
.highlight-card{background:white;border-radius:12px;border:1.5px solid var(--border);padding:18px 20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.hl-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.hl-tag{font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:4px;text-transform:uppercase;}
.hl-tag.tag-polity{background:#e8eeff;color:#2c4cc0;}
.hl-tag.tag-economy{background:#fce8e8;color:#8b1a1a;}
.hl-tag.tag-env{background:#e0f4f0;color:#1a6655;}
.hl-tag.tag-ir{background:#fff0e8;color:#8b4000;}
.hl-tag.tag-science{background:#f0e8ff;color:#5a1ab5;}
.hl-tag.tag-governance{background:#e8f0e8;color:#2a5a2a;}
.hl-source{font-size:10px;font-weight:700;color:var(--muted);background:var(--white2);padding:2px 7px;border-radius:4px;}
.hl-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:6px;line-height:1.4;font-family:'Source Sans 3',sans-serif;}
.hl-title.devanagari{font-family:'Noto Sans Devanagari',sans-serif;}
.hl-body{font-size:13px;color:#4a5a6a;line-height:1.6;font-family:'Source Sans 3',sans-serif;}
.hl-body.devanagari{font-family:'Noto Sans Devanagari',sans-serif;line-height:1.9;}

/* QUIZ CTA */
.quiz-cta-wrap{text-align:center;padding:32px 0 16px;}
.btn-start-quiz{background:linear-gradient(135deg,var(--saffron),var(--saffron2));color:white;border:none;padding:18px 48px;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 6px 20px rgba(232,119,34,0.35);transition:all 0.2s;display:inline-flex;align-items:center;gap:10px;}
.btn-start-quiz:hover{transform:translateY(-2px);}
.quiz-cta-sub{margin-top:10px;font-size:13px;color:var(--muted);}
.quiz-cta-sub.devanagari{font-family:'Noto Sans Devanagari',sans-serif;}

/* QUIZ PAGE — hidden by default */
#quizPage{display:none;}
#summaryPage{display:block;}

/* QUIZ HEADER WITH TIMER */
.quiz-header{background:linear-gradient(135deg,var(--navy2),var(--navy));border-radius:14px 14px 0 0;padding:20px 28px;display:flex;align-items:center;justify-content:space-between;border-left:5px solid var(--gold);}
.quiz-header-text h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--white);}
.quiz-header-text h3.devanagari{font-family:'Noto Sans Devanagari',sans-serif;font-size:17px;}
.quiz-header-text p{font-size:12px;color:var(--gold2);margin-top:2px;}
.quiz-header-text p.devanagari{font-family:'Noto Sans Devanagari',sans-serif;}
.timer-box{background:rgba(255,255,255,0.1);border:2px solid var(--gold);border-radius:12px;padding:10px 20px;text-align:center;min-width:100px;}
.timer-label{font-size:10px;color:var(--gold2);letter-spacing:1px;font-weight:700;margin-bottom:2px;}
.timer-label.devanagari{font-family:'Noto Sans Devanagari',sans-serif;letter-spacing:0;}
.timer-value{font-size:24px;font-weight:700;color:white;font-family:'Playfair Display',serif;letter-spacing:2px;}
.timer-box.warning{border-color:#ff6b6b;animation:timerPulse 1s infinite;}
.timer-box.warning .timer-value{color:#ff6b6b;}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:0.6}}

.quiz-body{background:white;border-radius:0 0 14px 14px;border:1.5px solid var(--border);border-top:none;box-shadow:var(--shadow);}

/* QUESTION */
.q-card{border-bottom:1px solid var(--border);padding:24px 28px;}
.q-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.q-num{font-size:12px;font-weight:700;color:var(--muted);background:var(--white2);padding:3px 10px;border-radius:6px;}
.q-subject{font-size:11px;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:6px;text-transform:uppercase;}
.q-subject.devanagari{font-family:'Noto Sans Devanagari',sans-serif;letter-spacing:0;font-size:10px;}
.q-text{font-size:15px;line-height:1.75;color:var(--navy);margin-bottom:16px;font-weight:600;font-family:'Source Sans 3',sans-serif;}
.q-text.devanagari{font-family:'Noto Sans Devanagari',sans-serif;font-size:14px;line-height:2;}
.options{display:flex;flex-direction:column;gap:8px;}
.opt-btn{display:flex;align-items:flex-start;gap:12px;background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:12px 16px;cursor:pointer;font-size:14px;text-align:left;width:100%;transition:all 0.15s;color:var(--navy);font-family:'Source Sans 3',sans-serif;}
.opt-btn.devanagari{font-family:'Noto Sans Devanagari',sans-serif;font-size:13px;line-height:1.8;}
.opt-btn:hover:not(:disabled){background:#f0f4ff;border-color:#99aadd;}
.opt-btn.selected{background:#eef2ff;border-color:#5a7bd0;}
.opt-btn.correct{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.opt-btn.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-weight:700;font-size:13px;min-width:20px;margin-top:1px;font-family:'Source Sans 3',sans-serif;}

/* EXPLANATION — STRICTLY hidden until submit */
.explanation{background:#fffbf0;border:1.5px solid #f0d98a;border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.7;color:#4a3a10;margin-top:10px;font-family:'Source Sans 3',sans-serif;display:none;}
.explanation.devanagari{font-family:'Noto Sans Devanagari',sans-serif;line-height:2;}
.explanation.show{display:block;}

/* SCORE */
.score-banner{background:linear-gradient(135deg,var(--navy2),var(--navy));border-radius:12px;padding:28px;margin:24px 28px 28px;text-align:center;display:none;}
.score-banner.visible{display:block;}
.score-big{font-family:'Playfair Display',serif;font-size:52px;color:var(--gold2);line-height:1;margin-bottom:6px;}
.score-sub{color:rgba(255,255,255,0.7);font-size:14px;margin-bottom:12px;}
.score-grade{font-size:18px;font-weight:700;color:white;margin-bottom:16px;}
.score-grade.devanagari{font-family:'Noto Sans Devanagari',sans-serif;font-size:15px;}
.btn-retake{background:var(--saffron);color:white;border:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin:4px;}

/* SUBMIT */
.submit-wrap{padding:20px 28px;border-top:1px solid var(--border);}
.btn-submit{background:linear-gradient(135deg,var(--saffron),var(--saffron2));color:white;border:none;padding:14px 36px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(232,119,34,0.3);transition:all 0.15s;width:100%;}
.btn-submit.devanagari{font-family:'Noto Sans Devanagari',sans-serif;}
.btn-submit:disabled{opacity:0.5;cursor:default;}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp 0.4s ease forwards;}

@media(max-width:600px){
  .q-card{padding:18px 16px;}
  .summary-card,.quiz-header{padding:18px 16px;}
  .highlights-grid,.breakdown-grid{grid-template-columns:1fr;}
  .score-banner{margin:16px;}
  .submit-wrap{padding:16px;}
  .btn-start-quiz{padding:15px 28px;font-size:15px;}
  .quiz-header{flex-direction:column;gap:12px;border-radius:14px 14px 0 0;}
}
</style>
</head>
<body>

<div class="lang-bar">
  <div class="lang-brand"><span>🏛️</span><span>PrepSaathi</span></div>
  <div class="lang-switch">
    <button class="lang-btn active" id="btnEn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btnHi" onclick="setLang('hi')">हिंदी</button>
  </div>
</div>

<header class="site-header">
  <div class="nav-logo">
    <div class="nav-logo-icon">📰</div>
    <div class="nav-logo-text">
      <strong id="navTitle">Daily Current Affairs</strong>
      <small>PIB · AIR News · Govt Sources</small>
    </div>
  </div>
  <a href="index.html" class="header-back" id="backBtn">← Home</a>
</header>

<div class="container">
  <div id="app"></div>
</div>

<script>
// ── STATE — all declared first ────────────────────────────────────────────────
let quizData = null;
let userAnswers = {};
let submitted = false;
let quizMode = false;
let timerInterval = null;
let timerSeconds = 15 * 60;
let lang = localStorage.getItem('prepsaathi_lang') || 'en';

// ── LANGUAGE ──────────────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  localStorage.setItem('prepsaathi_lang', l);
  document.getElementById('btnEn').classList.toggle('active', l==='en');
  document.getElementById('btnHi').classList.toggle('active', l==='hi');
  document.getElementById('navTitle').textContent = l==='hi' ? 'दैनिक समसामयिक मामले' : 'Daily Current Affairs';
  document.getElementById('backBtn').innerHTML = l==='hi' ? '← होम' : '← Home';
  if (!quizData) return;

  if (quizMode && submitted) {
    // Submitted — re-render but restore full state
    renderQuizPage();
    setTimeout(() => {
      const hi = l === 'hi';
      quizData.questions.forEach((q, i) => {
        const ua = userAnswers[i];
        const ca = q.answer;
        for (let j = 0; j < 4; j++) {
          const b = document.getElementById('opt-'+i+'-'+j);
          if (!b) continue;
          b.disabled = true;
          b.classList.remove('selected');
          if (j===ca) b.classList.add('correct');
          else if (j===ua && ua!==ca) b.classList.add('wrong');
        }
        const exp = document.getElementById('exp-'+i);
        if (exp) exp.classList.add('show');
      });
      // Restore score banner
      const total = quizData.questions.length;
      const correct = quizData.questions.filter((q,i) => userAnswers[i]===q.answer).length;
      const pct = Math.round((correct/total)*100);
      const grade = pct>=80?'🏆 Excellent — IAS Calibre!':pct>=60?'🎯 Good — Keep practising!':pct>=40?"📚 Fair — Review today's highlights":'💪 Keep reading daily!';
      const gradeHi = pct>=80?'🏆 उत्कृष्ट — IAS स्तर!':pct>=60?'🎯 अच्छा — अभ्यास जारी रखें!':pct>=40?'📚 ठीक — मुख्य बातें दोहराएं':'💪 रोज पढ़ते रहें!';
      const banner = document.getElementById('scoreBanner');
      if (banner) {
        banner.innerHTML = '<div class="score-big">'+correct+'/'+total+'</div><div class="score-sub">'+pct+'% accuracy · Today\'s Current Affairs</div><div class="score-grade'+(hi?' devanagari':'')+'">'+( hi?gradeHi:grade)+'</div><button class="btn-retake" onclick="goToQuiz()">🔄 '+(hi?'दोबारा प्रयास करें':'Try Again')+'</button><button class="btn-retake" onclick="backToSummary()" style="background:var(--navy2)">📰 '+(hi?'सारांश देखें':'View Summary')+'</button>';
        banner.classList.add('visible');
      }
      const sb = document.getElementById('submitBtn');
      if (sb) sb.disabled = true;
      const tb = document.getElementById('timerBox');
      if (tb) tb.style.display='none';
    }, 50);
  } else if (quizMode && !submitted) {
    // Quiz open not submitted — re-render and restore selections
    renderQuizPage();
    setTimeout(() => {
      Object.entries(userAnswers).forEach(([qi, oi]) => {
        const b = document.getElementById('opt-'+qi+'-'+oi);
        if (b) b.classList.add('selected');
      });
    }, 50);
  } else {
    renderSummaryPage();
  }
}
setLang(lang);

const tagColorMap = {
  'Polity':'tag-polity','Economy':'tag-economy','Environment':'tag-env',
  'IR':'tag-ir','Science':'tag-science','Governance':'tag-governance',
  'History':'tag-history','Geography':'tag-geography','Art & Culture':'tag-culture'
};

const subjectHiMap = {
  'Polity':'राजनीति','Economy':'अर्थव्यवस्था','Environment':'पर्यावरण',
  'IR':'अंतर्राष्ट्रीय संबंध','Science':'विज्ञान','Governance':'शासन',
  'History':'इतिहास','Geography':'भूगोल'
};

// ── TIMER ─────────────────────────────────────────────────────────────────────
function startTimer() {
  timerSeconds = 15 * 60;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) { clearInterval(timerInterval); submitQuiz(true); }
  }, 1000);
}

function stopTimer() { if (timerInterval) clearInterval(timerInterval); }

function updateTimerDisplay() {
  const el = document.getElementById('timerValue');
  const box = document.getElementById('timerBox');
  if (!el) return;
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  if (box && timerSeconds <= 120) box.classList.add('warning');
}

// ── LOADING ───────────────────────────────────────────────────────────────────
function renderLoading(step = 0) {
  const steps = [
    { en:'Fetching from PIB & AIR News…', hi:'PIB और AIR से समाचार ला रहे हैं…' },
    { en:'Analysing UPSC-relevant events…', hi:'UPSC प्रासंगिक घटनाएं विश्लेषण…' },
    { en:'Writing summary & highlights…', hi:'सारांश और मुख्य बातें लिख रहे हैं…' },
    { en:'Generating 10 Prelims questions…', hi:'10 प्रारंभिक प्रश्न तैयार हो रहे हैं…' },
    { en:'Translating to Hindi…', hi:'हिंदी में अनुवाद हो रहा है…' },
  ];
  const hi = lang === 'hi';
  document.getElementById('app').innerHTML = `
    <div class="loading-card fade-up">
      <div class="spinner"></div>
      <h3>${hi ? 'आज का करेंट अफेयर्स तैयार हो रहा है…' : "Building Today's Current Affairs…"}</h3>
      <p style="margin-top:8px">${hi ? 'PIB, AIR न्यूज़ और सरकारी स्रोतों से प्राप्त हो रहा है।' : 'Fetching from PIB, AIR News & official government sources.'}</p>
      <div class="loading-steps">
        ${steps.map((s,i) => `
          <div class="loading-step ${i<step?'done':i===step?'active':''}">
            <div class="step-dot"></div>
            <span${hi?' style="font-family:Noto Sans Devanagari,sans-serif"':''}>${i<step?'✓ ':''}${hi?s.hi:s.en}</span>
          </div>`).join('')}
      </div>
    </div>`;
}

function renderError(msg) {
  const hi = lang === 'hi';
  document.getElementById('app').innerHTML = `
    <div class="error-card fade-up">
      <h3>⚠️ ${hi ? 'आज का क्विज़ लोड नहीं हो सका' : "Could not load today's quiz"}</h3>
      <p>${msg}</p>
      <button class="btn-retry" onclick="loadQuiz()">🔄 ${hi?'पुनः प्रयास करें':'Try Again'}</button>
    </div>`;
}

// ── FETCH ─────────────────────────────────────────────────────────────────────
async function loadQuiz() {
  userAnswers = {}; submitted = false; quizMode = false; stopTimer();
  renderLoading(0);
  let step = 0;
  const t = setInterval(() => { step = Math.min(step+1, 4); renderLoading(step); }, 2500);
  try {
    const res = await fetch('/api/current-affairs');
    clearInterval(t);
    if (!res.ok) { const e = await res.json().catch(() => ({error:'Server error'})); renderError(e.error||'Server error'); return; }
    quizData = await res.json();
    renderSummaryPage();
  } catch(err) {
    clearInterval(t);
    renderError('Network error — please check your connection.');
  }
}

// ── SUMMARY PAGE ──────────────────────────────────────────────────────────────
function renderSummaryPage() {
  quizMode = false;
  const d = quizData;
  const hi = lang === 'hi';

  const summary = hi ? (d.summaryHi || d.summary) : d.summary;
  const isHiSummary = hi && d.summaryHi;

  const sectionHiHeadings = {
    'Polity': 'राजनीति और शासन', 'Economy': 'अर्थव्यवस्था और वित्त',
    'IR': 'अंतर्राष्ट्रीय संबंध', 'Environment': 'पर्यावरण',
    'Science': 'विज्ञान और प्रौद्योगिकी', 'Geography': 'भूगोल',
    'History': 'इतिहास', 'Art & Culture': 'कला और संस्कृति'
  };
  const breakdownHTML = (d.sections || []).map(s => {
    const tc = tagColorMap[s.tag] || 'tag-polity';
    const heading = hi ? (sectionHiHeadings[s.tag] || s.heading) : s.heading;
    const sContent = hi ? (s.contentHi && s.contentHi !== s.content ? s.contentHi : s.content) : s.content;
    return `<div class="breakdown-item ${tc}">
      <h4>${s.icon||'📌'} ${heading}</h4>
      <p class="item-text">${sContent}</p>
    </div>`;
  }).join('');

  const hlHTML = (d.highlights || []).map(hl => {
    const tc = tagColorMap[hl.tag] || 'tag-polity';
    const title = hi ? (hl.titleHi || hl.title) : hl.title;
    const body = hi ? (hl.bodyHi || hl.body) : hl.body;
    const isHi = hi && hl.titleHi;
    return `<div class="highlight-card">
      <div class="hl-top"><span class="hl-tag ${tc}">${hl.tag}</span><span class="hl-source">${hl.source||'PIB'}</span></div>
      <div class="hl-title${isHi?' devanagari':''}">${title}</div>
      <div class="hl-body${isHi?' devanagari':''}">${body}</div>
    </div>`;
  }).join('');

  // STATIC CONNECT HTML
  const staticHTML = (d.staticConnects || []).map(sc => {
    const tc = tagColorMap[sc.subject] || 'tag-polity';
    const newsText = hi ? (sc.newsHi || sc.news) : sc.news;
    const linkText = hi ? (sc.staticLinkHi || sc.staticLink) : sc.staticLink;
    const subjectLabel = hi ? (sc.subjectHi || sc.subject) : sc.subject;
    const isHiSc = hi && sc.newsHi;
    return '<div class="static-card"><div class="static-top"><span class="static-icon">'+(sc.icon||'🔗')+'</span><span class="static-subject '+tc+'">'+subjectLabel+'</span></div><div class="static-news'+(isHiSc?' devanagari':'')+'">📰 '+newsText+'</div><div class="static-link'+(isHiSc?' devanagari':'')+'">🎯 '+linkText+'</div></div>';
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="date-banner fade-up">
      <div>
        <h2>${hi ? '📰 आज के समसामयिक मामले' : "📰 Today's Current Affairs"}</h2>
        <p>${d.date||''}</p>
      </div>
      <div class="date-pills">
        <span class="date-pill">📌 PIB</span>
        <span class="date-pill">📻 AIR News</span>
        <span class="date-pill">🏛️ Govt Sources</span>
      </div>
    </div>

    <div class="section-label">${hi ? '📝 आज का सारांश — PIB और AIR स्रोत' : '📝 Today\'s Summary — PIB & AIR Sources'}</div>
    <div class="summary-card fade-up">
      <p class="summary-text${isHiSummary?' devanagari':''}">${summary}</p>
      ${breakdownHTML ? `<div class="breakdown-grid">${breakdownHTML}</div>` : ''}
      <p class="source-note">Source: Press Information Bureau (PIB) · All India Radio (AIR) · RBI · MEA · MoEF · Ministry press releases</p>
    </div>

    <div class="section-label">${hi ? '🔑 मुख्य बातें' : '🔑 Key Highlights'}</div>
    <div class="highlights-grid fade-up">${hlHTML}</div>

    ${staticHTML ? `
    <div class="section-label">${hi ? '🔗 स्टेटिक कनेक्ट — समाचार से UPSC सिलेबस तक' : '🔗 Static Connect — From News to UPSC Syllabus'}</div>
    <div class="static-connect-grid fade-up">${staticHTML}</div>
    ` : ''}

    <div class="quiz-cta-wrap fade-up">
      <button class="btn-start-quiz" onclick="goToQuiz()">
        ❓ ${hi ? 'आज का 10 प्रश्न क्विज़ दें' : "Take Today's 10-Question Quiz"}
      </button>
      <p class="quiz-cta-sub${hi?' devanagari':''}">
        ${hi ? '15 मिनट · UPSC प्रारंभिक पैटर्न · जमा के बाद व्याख्या' : '15 min timer · UPSC Prelims pattern · Explanations after submission'}
      </p>
    </div>`;
}

// ── GO TO QUIZ PAGE ───────────────────────────────────────────────────────────
function goToQuiz() {
  userAnswers = {};
  submitted = false;
  renderQuizPage();
  startTimer();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── QUIZ PAGE ─────────────────────────────────────────────────────────────────
function renderQuizPage() {
  quizMode = true;
  const d = quizData;
  const hi = lang === 'hi';

  const qHTML = (d.questions || []).map((q, i) => {
    const tc = tagColorMap[q.subject] || 'tag-polity';
    const subjectLabel = hi ? (subjectHiMap[q.subject] || q.subject) : q.subject;
    // Use Hindi if available AND different from English
    const hasHiQ = hi && q.qHi && q.qHi !== q.q;
    const hasHiOpts = hi && q.optionsHi && q.optionsHi[0] !== q.options[0];
    const hasHiExp = hi && q.explanationHi && q.explanationHi !== q.explanation;
    const qText = hasHiQ ? q.qHi : q.q;
    const opts = hasHiOpts ? q.optionsHi : q.options;
    const expText = hasHiExp ? q.explanationHi : q.explanation;
    const isHi = hi && (hasHiQ || hasHiOpts);

    const optsHTML = opts.map((o, j) => {
      const cleanOpt = String(o).replace(/^[A-D]\)\s*/i, '').trim();
      return `<button class="opt-btn${isHi?' devanagari':''}" id="opt-${i}-${j}" onclick="selectAnswer(${i},${j})">
        <span class="opt-letter">${['A','B','C','D'][j]}.</span><span>${cleanOpt}</span>
      </button>`;
    }).join('');

    return `
      <div class="q-card" id="qcard-${i}">
        <div class="q-top">
          <span class="q-num">Q.${i+1}</span>
          <span class="q-subject ${tc}${hi?' devanagari':''}">${subjectLabel}</span>
        </div>
        <div class="q-text${isHi?' devanagari':''}">${qText}</div>
        <div class="options">${optsHTML}</div>
        <div class="explanation${hi?' devanagari':''}" id="exp-${i}">📖 <strong>${hi?'व्याख्या':'Explanation'}:</strong> ${expText}</div>
      </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div style="margin-bottom:16px">
      <button onclick="backToSummary()" style="background:none;border:1.5px solid var(--border);border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);font-family:inherit;">
        ← ${hi ? 'सारांश पर वापस जाएं' : 'Back to Summary'}
      </button>
    </div>
    <div class="quiz-header">
      <div class="quiz-header-text">
        <h3${hi?' class="devanagari"':''}>${hi ? '❓ आज का समसामयिक क्विज़' : "❓ Today's Current Affairs Quiz"}</h3>
        <p${hi?' class="devanagari"':''}>${hi ? '10 प्रश्न · UPSC प्रारंभिक पैटर्न · कोई नकारात्मक अंकन नहीं' : '10 Questions · UPSC Prelims Pattern · No Negative Marking'}</p>
      </div>
      <div class="timer-box" id="timerBox">
        <div class="timer-label${hi?' devanagari':''}">${hi?'समय शेष':'TIME LEFT'}</div>
        <div class="timer-value" id="timerValue">15:00</div>
      </div>
    </div>
    <div class="quiz-body">
      ${qHTML}
      <div class="score-banner" id="scoreBanner"></div>
      <div class="submit-wrap">
        <button class="btn-submit${hi?' devanagari':''}" id="submitBtn" onclick="submitQuiz(false)">
          ✅ ${hi ? 'जमा करें और परिणाम देखें' : 'Submit & See Results'}
        </button>
      </div>
    </div>`;
}

function backToSummary() {
  stopTimer();
  submitted = false;
  userAnswers = {};
  renderSummaryPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── SELECT ANSWER ─────────────────────────────────────────────────────────────
function selectAnswer(qIdx, optIdx) {
  if (submitted) return;
  userAnswers[qIdx] = optIdx;
  for (let j = 0; j < 4; j++) {
    const b = document.getElementById(`opt-${qIdx}-${j}`);
    if (b) b.classList.toggle('selected', j === optIdx);
  }
}

// ── SUBMIT QUIZ ───────────────────────────────────────────────────────────────
function submitQuiz(autoSubmit = false) {
  submitted = true;
  stopTimer();
  const btn = document.getElementById('submitBtn');
  if (btn) btn.disabled = true;

  let correct = 0;
  quizData.questions.forEach((q, i) => {
    const ua = userAnswers[i];
    const ca = q.answer;
    for (let j = 0; j < 4; j++) {
      const b = document.getElementById(`opt-${i}-${j}`);
      if (!b) return;
      b.disabled = true;
      b.classList.remove('selected');
      if (j === ca) b.classList.add('correct');
      else if (j === ua && ua !== ca) b.classList.add('wrong');
    }
    // Show explanation ONLY now
    const exp = document.getElementById(`exp-${i}`);
    if (exp) exp.classList.add('show');
    if (ua === ca) correct++;
  });

  const hi = lang === 'hi';
  const total = quizData.questions.length;
  const pct = Math.round((correct / total) * 100);
  const grade = pct>=80 ? '🏆 Excellent — IAS Calibre!' : pct>=60 ? '🎯 Good — Keep practising!' : pct>=40 ? "📚 Fair — Review today's highlights" : '💪 Keep reading daily!';
  const gradeHi = pct>=80 ? '🏆 उत्कृष्ट — IAS स्तर!' : pct>=60 ? '🎯 अच्छा — अभ्यास जारी रखें!' : pct>=40 ? '📚 ठीक — मुख्य बातें दोहराएं' : '💪 रोज पढ़ते रहें!';
  const timeMsg = autoSubmit ? `<br><small style="color:rgba(255,255,255,0.6)">⏰ ${hi?'समय समाप्त — स्वतः जमा':'Auto-submitted — time up!'}</small>` : '';

  const banner = document.getElementById('scoreBanner');
  banner.innerHTML = `
    <div class="score-big">${correct}/${total}</div>
    <div class="score-sub">${pct}% accuracy · Today's Current Affairs${timeMsg}</div>
    <div class="score-grade${hi?' devanagari':''}">${hi ? gradeHi : grade}</div>
    <button class="btn-retake" onclick="goToQuiz()">🔄 ${hi?'दोबारा प्रयास करें':'Try Again'}</button>
    <button class="btn-retake" onclick="backToSummary()" style="background:var(--navy2)">📰 ${hi?'सारांश देखें':'View Summary'}</button>`;
  banner.classList.add('visible');
  setTimeout(() => banner.scrollIntoView({ behavior:'smooth', block:'center' }), 200);
}

loadQuiz();
</script>
</body>
</html>
