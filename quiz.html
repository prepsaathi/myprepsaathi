<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPSC Civil Services Prelims Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;1,400&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0d1b2a;
  --navy2: #1b2d42;
  --saffron: #e87722;
  --saffron2: #f59530;
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --white: #f8f5ef;
  --white2: #ede8df;
  --green: #22723a;
  --green2: #2fa052;
  --green-bg: #e8f5ed;
  --green-border: #a8d8b4;
  --red: #c0392b;
  --red-bg: #fdecea;
  --muted: #7a8694;
  --shadow: 0 8px 32px rgba(13,27,42,0.18);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--navy);
  min-height: 100vh;
  font-family: 'Source Sans 3', sans-serif;
  color: var(--navy);
  background-image:
    radial-gradient(ellipse 80% 60% at 50% 0%, #1b3a5c 0%, transparent 70%),
    repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.012) 60px, rgba(255,255,255,0.012) 61px);
  padding: 0 0 60px;
}

/* ── HEADER ── */
.site-header {
  background: linear-gradient(135deg, var(--navy2) 0%, #0d1b2a 100%);
  border-bottom: 3px solid var(--saffron);
  padding: 18px 24px 16px;
  display: flex;
  align-items: center;
  gap: 18px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}
.emblem { font-size: 36px; line-height: 1; }
.site-title { flex: 1; }
.site-title h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(15px, 2.5vw, 22px);
  color: var(--white);
  letter-spacing: 1px;
}
.site-title p {
  font-size: 12px;
  color: var(--gold2);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 2px;
}
.header-back {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.15s;
}
.header-back:hover { color: var(--gold2); }

/* ── CONTAINER ── */
.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 32px 20px 0;
}

/* ── CARDS ── */
.card {
  background: var(--white);
  border-radius: 8px;
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 24px;
}

/* ── START SCREEN ── */
.start-screen { padding: 0; }
.start-hero {
  background: linear-gradient(135deg, var(--navy2), #0d1b2a);
  padding: 40px 40px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.start-hero::before {
  content: '⚖️ 🏛️ 📜';
  position: absolute;
  font-size: 120px;
  opacity: 0.04;
  top: -20px; right: -20px;
  letter-spacing: -20px;
}
.start-hero h2 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(22px, 4vw, 36px);
  color: var(--white);
  line-height: 1.2;
  margin-bottom: 10px;
}
.start-hero p { color: var(--gold2); font-size: 15px; font-style: italic; }

.start-body { padding: 32px 36px 36px; }
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}
.info-box {
  background: var(--white2);
  border: 1px solid #ddd5c5;
  border-radius: 6px;
  padding: 16px;
  text-align: center;
}
.info-box .ib-icon { font-size: 26px; margin-bottom: 6px; }
.info-box .ib-val {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1;
}
.info-box .ib-lbl { font-size: 12px; color: var(--muted); margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; }

.marking-box {
  background: #fff8ee;
  border: 1px solid var(--gold);
  border-radius: 6px;
  padding: 16px 20px;
  margin-bottom: 24px;
  font-size: 14px;
  color: var(--navy);
  line-height: 1.6;
}
.marking-box strong { color: var(--saffron); }

.syllabus-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
.stag {
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 20px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.stag-polity  { background: #e8eeff; color: #2c4cc0; }
.stag-history { background: #fef0e0; color: #8b4500; }
.stag-geo     { background: #e0f5e8; color: #1a6630; }
.stag-eco     { background: #fce8e8; color: #8b1a1a; }
.stag-env     { background: #e0f4f0; color: #1a6655; }
.stag-sci     { background: #f0e8ff; color: #5a1ab5; }
.stag-ir      { background: #fff0e8; color: #8b4000; }

.pyq-note {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--green-bg);
  border: 1.5px solid var(--green-border);
  border-radius: 6px;
  padding: 12px 16px;
  margin-bottom: 28px;
  font-size: 14px;
  color: var(--green);
}
.pyq-dot { width: 14px; height: 14px; border-radius: 3px; background: var(--green); flex-shrink: 0; }

.start-btn {
  display: block;
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--saffron), var(--saffron2));
  color: white;
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  letter-spacing: 1px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(232,119,34,0.35);
}
.start-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(232,119,34,0.45);
}

/* ── QUIZ SCREEN ── */
.quiz-topbar {
  background: var(--navy2);
  padding: 14px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.qbar-item { text-align: center; }
.qbar-val {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--gold2);
  line-height: 1;
}
.qbar-lbl { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
.qbar-neg { color: #e87070; }

.progress-bar-wrap { padding: 0; }
.progress-bar-bg {
  height: 4px;
  background: rgba(255,255,255,0.1);
}
.progress-bar-fill {
  height: 4px;
  background: linear-gradient(to right, var(--saffron), var(--saffron2));
  transition: width 0.5s ease;
}

.question-body { padding: 28px 32px 24px; }

/* PYQ badge */
.pyq-banner {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--green-bg);
  border: 1.5px solid var(--green-border);
  border-radius: 6px;
  padding: 10px 14px;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--green);
  font-weight: 600;
}
.pyq-badge {
  background: var(--green);
  color: white;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 3px 9px;
  border-radius: 3px;
  text-transform: uppercase;
}

.q-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.q-num {
  font-family: 'Playfair Display', serif;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 1px;
}
.q-subject-badge {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 3px;
}
.diff-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 3px;
  margin-left: auto;
}
.diff-easy   { background: #e8f5ed; color: #1a6630; }
.diff-medium { background: #fff4e0; color: #8b5000; }
.diff-hard   { background: #fdecea; color: #8b1a1a; }

.question-text {
  font-family: 'Playfair Display', serif;
  font-size: clamp(16px, 2.5vw, 20px);
  color: var(--navy);
  line-height: 1.5;
  margin-bottom: 24px;
  font-weight: 400;
}

/* Options */
.options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.opt-btn {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 18px;
  background: var(--white2);
  border: 1.5px solid #ddd5c5;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 15px;
  color: var(--navy);
  text-align: left;
  transition: all 0.15s;
  line-height: 1.45;
}
.opt-btn:hover:not(:disabled) {
  background: #fff4e6;
  border-color: var(--saffron);
  transform: translateX(4px);
}
.opt-letter {
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--saffron);
  min-width: 22px;
  margin-top: 1px;
}
.opt-btn:disabled { cursor: default; }
.opt-btn.selected-correct {
  background: var(--green-bg);
  border-color: var(--green2);
  color: var(--navy);
}
.opt-btn.selected-correct .opt-letter { color: var(--green); }
.opt-btn.selected-wrong {
  background: var(--red-bg);
  border-color: var(--red);
  opacity: 0.85;
}
.opt-btn.selected-wrong .opt-letter { color: var(--red); }
.opt-btn.show-correct {
  background: var(--green-bg);
  border-color: var(--green-border);
}
.opt-btn.show-correct .opt-letter { color: var(--green); }

.answer-indicator {
  margin-left: auto;
  font-size: 16px;
  flex-shrink: 0;
}

/* Nav buttons */
.quiz-nav {
  padding: 0 32px 28px;
  display: flex;
  gap: 12px;
}
.btn-skip {
  padding: 12px 24px;
  background: transparent;
  border: 1.5px solid #ccc;
  border-radius: 6px;
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Source Sans 3', sans-serif;
}
.btn-skip:hover { border-color: var(--navy); color: var(--navy); }
.btn-next {
  flex: 1;
  padding: 12px 24px;
  background: var(--navy);
  color: var(--gold2);
  border: none;
  border-radius: 6px;
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
  opacity: 0;
  pointer-events: none;
}
.btn-next.active { opacity: 1; pointer-events: all; }
.btn-next:hover { background: var(--navy2); }

/* Answered tracker */
.answered-tracker {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 12px 32px 16px;
}
.tracker-dot {
  width: 26px;
  height: 26px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  font-family: 'Source Sans 3', sans-serif;
  background: var(--white2);
  border: 1.5px solid #ddd5c5;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.tracker-dot.current { border-color: var(--saffron); color: var(--saffron); background: #fff5ea; }
.tracker-dot.answered-n { background: #eef2ff; border-color: #5a7bd0; color: #2c4cc0; }
.tracker-dot.answered-c { background: var(--green-bg); border-color: var(--green2); color: var(--green); }
.tracker-dot.answered-w { background: var(--red-bg); border-color: var(--red); color: var(--red); }
.tracker-dot.skipped { background: #f5f0e8; border-color: #c8b88a; color: #8b7a55; }

/* ── RESULTS SCREEN ── */
.results-header {
  background: linear-gradient(135deg, var(--navy2), #0d1b2a);
  padding: 36px 32px 28px;
  text-align: center;
}
.results-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px, 3vw, 30px);
  color: var(--white);
  margin-bottom: 6px;
}
.results-header p { color: var(--gold2); font-style: italic; font-size: 14px; }

.score-display {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 32px;
  padding: 28px 32px 0;
  flex-wrap: wrap;
}
.score-ring {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 5px solid var(--saffron);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 0 3px #fff, 0 0 0 8px var(--saffron2);
  background: white;
}
.score-ring .sr-num {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  font-weight: 900;
  color: var(--navy);
  line-height: 1;
}
.score-ring .sr-denom { font-size: 13px; color: var(--muted); }

.score-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  min-width: 200px;
}
.ss-item { text-align: center; padding: 12px; background: var(--white2); border-radius: 6px; }
.ss-val { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; line-height: 1; }
.ss-lbl { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }
.ss-green .ss-val { color: var(--green); }
.ss-red .ss-val { color: var(--red); }
.ss-orange .ss-val { color: var(--saffron); }
.ss-blue .ss-val { color: #2c4cc0; }

.rank-banner {
  margin: 24px 32px 0;
  padding: 16px 20px;
  border-radius: 6px;
  text-align: center;
  border: 2px solid;
}
.rank-banner .rank-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 4px;
}
.rank-banner p { font-size: 14px; font-style: italic; }
.rank-gold { background: #fffbf0; border-color: var(--gold); color: #7a5a00; }
.rank-green { background: var(--green-bg); border-color: var(--green2); color: var(--green); }
.rank-orange { background: #fff5ea; border-color: var(--saffron); color: #8b4500; }
.rank-muted { background: var(--white2); border-color: #ccc; color: var(--muted); }

/* Review section */
.review-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: var(--navy);
  padding: 28px 32px 16px;
  border-top: 1px solid #e0d8cc;
  margin-top: 24px;
}

.review-item {
  margin: 0 32px 20px;
  border-radius: 8px;
  overflow: hidden;
  border: 1.5px solid #ddd5c5;
}
.review-item.pyq-item {
  border: 2px solid var(--green-border);
}
.review-header {
  padding: 14px 18px 12px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.review-header.correct-h { background: var(--green-bg); border-bottom: 1px solid var(--green-border); }
.review-header.wrong-h   { background: var(--red-bg);   border-bottom: 1px solid #f0c0be; }
.review-header.skipped-h { background: #fdf8ee; border-bottom: 1px solid #e8d8aa; }

.ri-num {
  font-family: 'Playfair Display', serif;
  font-size: 13px;
  color: var(--muted);
  white-space: nowrap;
  margin-top: 2px;
}
.ri-q {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  color: var(--navy);
  line-height: 1.4;
  flex: 1;
}
.ri-result {
  font-size: 20px;
  flex-shrink: 0;
}

.pyq-mini-badge {
  background: var(--green);
  color: white;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 2px 8px;
  border-radius: 3px;
  white-space: nowrap;
}

.review-body { padding: 14px 18px 16px; background: white; }
.answer-row {
  display: flex;
  gap: 24px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  font-size: 13px;
}
.ar-item label {
  font-weight: 700;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  display: block;
  color: var(--muted);
  margin-bottom: 2px;
}
.ar-correct { color: var(--green); font-weight: 600; }
.ar-wrong   { color: var(--red);   font-weight: 600; }
.ar-skip    { color: #8b7a55;      font-style: italic; }

.explanation-box {
  background: var(--white2);
  border-left: 3px solid var(--saffron);
  padding: 12px 14px;
  font-size: 14px;
  line-height: 1.65;
  color: var(--navy);
  border-radius: 0 4px 4px 0;
}
.explanation-box strong { color: var(--saffron); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 5px; }

.result-actions {
  padding: 24px 32px 32px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.btn-replay {
  flex: 1;
  padding: 14px;
  background: linear-gradient(135deg, var(--saffron), var(--saffron2));
  color: white;
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(232,119,34,0.3);
}
.btn-replay:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,119,34,0.4); }

/* ── MODAL OVERLAY ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(13,27,42,0.75);
  backdrop-filter: blur(3px);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeOverlay 0.2s ease forwards;
}
@keyframes fadeOverlay {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.modal-box {
  background: var(--white);
  border-radius: 12px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  max-width: 480px;
  width: 100%;
  overflow: hidden;
  animation: modalPop 0.25s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes modalPop {
  from { opacity:0; transform: scale(0.92) translateY(16px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}
.modal-header {
  background: linear-gradient(135deg, var(--navy2), var(--navy));
  padding: 24px 28px 20px;
  text-align: center;
}
.modal-header .modal-icon { font-size: 40px; margin-bottom: 8px; display: block; }
.modal-header h3 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: var(--white);
  margin-bottom: 6px;
}
.modal-header p { font-size: 13px; color: var(--gold2); font-style: italic; }

.modal-stats {
  display: flex;
  justify-content: center;
  gap: 0;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.modal-stat {
  flex: 1;
  padding: 12px 8px;
  text-align: center;
  border-right: 1px solid rgba(255,255,255,0.08);
}
.modal-stat:last-child { border-right: none; }
.modal-stat .ms-val {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  line-height: 1;
}
.modal-stat .ms-lbl { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; opacity: 0.7; }
.ms-answered .ms-val { color: var(--saffron2); }
.ms-skipped  .ms-val { color: #f0d080; }
.ms-left     .ms-val { color: #a8d8b4; }

.modal-body { padding: 24px 28px; }
.modal-body p {
  font-size: 14px;
  color: var(--navy);
  text-align: center;
  margin-bottom: 20px;
  line-height: 1.6;
}
.modal-actions { display: flex; flex-direction: column; gap: 10px; }

.mbtn {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 15px;
  font-weight: 600;
  transition: all 0.15s;
  text-align: left;
  width: 100%;
}
.mbtn-icon { font-size: 22px; flex-shrink: 0; }
.mbtn-text { flex: 1; }
.mbtn-text span { display: block; font-size: 12px; font-weight: 400; opacity: 0.75; margin-top: 2px; }

.mbtn-finish {
  background: linear-gradient(135deg, var(--saffron), var(--saffron2));
  color: white;
  box-shadow: 0 4px 14px rgba(232,119,34,0.35);
}
.mbtn-finish:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,119,34,0.45); }

.mbtn-skipped {
  background: var(--green-bg);
  border: 1.5px solid var(--green-border);
  color: var(--green);
}
.mbtn-skipped:hover { background: #d4eddb; }

.mbtn-back {
  background: var(--white2);
  border: 1.5px solid #ddd5c5;
  color: var(--navy);
}
.mbtn-back:hover { background: #e0d8cc; }

.skipped-pill-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
  justify-content: center;
}
.skipped-pill {
  background: #fff4e6;
  border: 1.5px solid var(--saffron);
  color: var(--saffron);
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  font-family: 'Source Sans 3', sans-serif;
}

/* ── TIMERS ── */
.qbar-timer {
  font-size: 15px;
  font-weight: 700;
  color: var(--gold2);
  font-variant-numeric: tabular-nums;
  letter-spacing: 1px;
}
.qbar-timer.warning { color: #ff6b6b; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

.main-timer {
  display: flex;
  align-items: center;
  gap: 7px;
  background: rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 15px;
  font-weight: 700;
  color: var(--gold2);
  font-variant-numeric: tabular-nums;
  letter-spacing: 1px;
  border: 1.5px solid rgba(255,255,255,0.1);
  transition: all 0.3s;
}
.main-timer.warning {
  background: rgba(255,60,60,0.15);
  border-color: #ff4444;
  color: #ff6b6b;
  animation: pulse 1s infinite;
}
.main-timer span { font-size: 13px; opacity: 0.7; font-weight: 400; }

/* Time-up modal */
.timeup-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.timeup-box {
  background: white;
  border-radius: 16px;
  padding: 40px 36px;
  max-width: 420px;
  width: 90%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.timeup-icon { font-size: 56px; margin-bottom: 16px; }
.timeup-box h2 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  color: var(--navy);
  margin-bottom: 10px;
}
.timeup-box p { color: #666; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
.timeup-btn {
  background: linear-gradient(135deg, var(--saffron), var(--saffron2));
  color: white;
  border: none;
  padding: 14px 32px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
  font-family: 'Source Sans 3', sans-serif;
  transition: transform 0.15s;
}
.timeup-btn:hover { transform: translateY(-1px); }

/* Per-question time in results */
.q-time-spent {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--muted);
  background: #f0f0f0;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: 6px;
}
.time-summary-box {
  background: #f8f5ef;
  border: 1.5px solid #e0d8cc;
  border-radius: 10px;
  padding: 16px 20px;
  margin: 0 24px 20px;
}
.time-summary-box h4 {
  font-size: 13px;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.time-summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
}
.tsg-item {
  background: white;
  border-radius: 8px;
  padding: 8px 10px;
  text-align: center;
  border: 1px solid #e8e0d4;
}
.tsg-item .tsq { font-size: 11px; font-weight: 700; color: var(--muted); }
.tsg-item .tst { font-size: 14px; font-weight: 700; color: var(--navy); margin-top: 2px; }
.opt-btn.selected-neutral {
  background: #eef2ff;
  border-color: #5a7bd0;
  color: var(--navy);
}
.opt-btn.selected-neutral .opt-letter { color: #2c4cc0; }

/* ── LANGUAGE TOGGLE ── */
.lang-toggle {
  display: flex;
  align-items: center;
  gap: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 4px;
}
.lang-toggle button {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Source Sans 3', sans-serif;
}
.lang-toggle button.active {
  background: var(--saffron);
  color: white;
}
.hi-q { font-family: 'Noto Sans Devanagari', sans-serif; font-size: 15px; line-height: 1.8; }

/* Animations */
@keyframes fadeUp {
  from { opacity:0; transform: translateY(16px); }
  to   { opacity:1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.4s ease forwards; }

/* Mobile */
@media (max-width:560px) {
  .question-body { padding: 20px 16px 16px; }
  .quiz-nav { padding: 0 16px 20px; }
  .answered-tracker { padding: 8px 16px 12px; }
  .review-item { margin: 0 16px 16px; }
  .review-title { padding: 24px 16px 12px; }
  .result-actions { padding: 16px 16px 24px; }
  .start-body { padding: 24px 20px 24px; }
  .score-display { gap: 20px; }
</style>

// ── TIMER HELPERS ─────────────────────────────────────────────────────────────
function fmtTime(secs){
  const m = Math.floor(secs/60);
  const s = secs % 60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function startMainTimer(){
  const display = document.getElementById('mainTimerDisplay');
  if(display) display.style.display = 'flex';
  clearInterval(state.mainTimerInterval);
  state.mainTimerInterval = setInterval(()=>{
    state.mainSecsLeft--;
    const el = document.getElementById('mainTimerVal');
    const disp = document.getElementById('mainTimerDisplay');
    if(el) el.textContent = fmtTime(state.mainSecsLeft);
    if(disp){
      if(state.mainSecsLeft <= 300) disp.classList.add('warning');
      else disp.classList.remove('warning');
    }
    if(state.mainSecsLeft <= 0){
      clearInterval(state.mainTimerInterval);
      stopQTimer();
      showTimeUpModal();
    }
  }, 1000);
}

function stopMainTimer(){
  clearInterval(state.mainTimerInterval);
}

function startQTimer(qId){
  stopQTimer();
  state.qTimerStart = Date.now();
  state.qTimerInterval = setInterval(()=>{
    const elapsed = Math.floor((Date.now() - state.qTimerStart) / 1000);
    const base = state.qTimeSecs[qId] || 0;
    const total = base + elapsed;
    const el = document.getElementById('qTimerVal');
    if(el) el.textContent = fmtTime(total);
  }, 1000);
}

function stopQTimer(){
  if(state.qTimerInterval){
    clearInterval(state.qTimerInterval);
    state.qTimerInterval = null;
  }
  // Save elapsed time to current question
  if(state.qTimerStart !== null && state.questions.length > 0){
    const q = state.questions[state.current];
    if(q){
      const elapsed = Math.floor((Date.now() - state.qTimerStart) / 1000);
      state.qTimeSecs[q.id] = (state.qTimeSecs[q.id] || 0) + elapsed;
    }
    state.qTimerStart = null;
  }
}

// ── QUIZ SCREEN ───────────────────────────────────────────────────────────────
function renderQuiz(){
  const q = state.questions[state.current];
  const total = state.questions.length;
  const prog = Math.round((state.current / total) * 100);
  const sColor = SUBJ_COLORS[q.subjectClass];
  const diffClass = {easy:'diff-easy',medium:'diff-medium',hard:'diff-hard'}[q.difficulty];

  const trackerHTML = state.questions.map((qq,i)=>{
    let cls = 'tracker-dot';
    if(i === state.current) cls += ' current';
    else if(state.answers.hasOwnProperty(qq.id)){
      // During quiz: show only "answered" (neutral) or "skipped" — no correct/wrong reveal
      cls += state.answers[qq.id] === null ? ' skipped' : ' answered-n';
    }
    return `<div class="${cls}" title="Q${i+1}" onclick="jumpTo(${i})">${i+1}</div>`;
  }).join('');

  const optLetters = ['A','B','C','D'];
  const selectedAns = state.answers[q.id];

  const optionsHTML = getOpts(q).map((opt,i)=>{
    let cls = 'opt-btn';
    if(selectedAns !== null && selectedAns !== undefined && selectedAns === i){
      cls += ' selected-neutral';
    }
    const optClass = quizLang==='hi' ? ' class="hi-q"' : '';
    return `<button class="${cls}" onclick="selectAnswer(${q.id},${i})">
      <span class="opt-letter">${optLetters[i]}.</span>
      <span style="flex:1"${optClass}>${opt}</span>
    </button>`;
  }).join('');

  const pyqBanner = q.pyq ? `
    <div class="pyq-banner">
      <span class="pyq-badge">📄 PYQ</span>
      <span>${quizLang==='hi' ? `यह प्रश्न <strong>UPSC CSE — ${q.pyqYear}</strong> में आया था` : `This question appeared in <strong>UPSC CSE — ${q.pyqYear}</strong>`}</span>
    </div>` : '';

  const questionText = getQ(q).split('\n').map(l => l.trim()).filter(Boolean).join('<br>');
  const questionLines = `<span${quizLang==='hi' ? ' class="hi-q"' : ''}>${questionText}</span>`;

  const hasSelection = selectedAns !== null && selectedAns !== undefined;
  const isLastQ = state.current === total - 1;
  const hi = quizLang === 'hi';
  const nextLabel = isLastQ
    ? (hi ? 'समीक्षा करें और जमा करें →' : 'Review & Submit →')
    : (hi ? 'अगला प्रश्न →' : 'Next Question →');
  const skipLabel = hasSelection ? (hi ? 'साफ करें और छोड़ें →' : 'Clear & Skip →') : (hi ? 'छोड़ें →' : 'Skip →');

  return `<div class="card fade-up">
    <div class="quiz-topbar">
      <div class="qbar-item"><span class="qbar-val">${state.current+1}/${total}</span><span class="qbar-lbl">${hi ? 'प्रश्न' : 'Question'}</span></div>
      <div class="qbar-item"><span class="qbar-val">${Object.keys(state.answers).filter(k => state.answers[k] !== null).length}</span><span class="qbar-lbl">${hi ? 'प्रयास' : 'Attempted'}</span></div>
      <div class="qbar-item"><span class="qbar-val" id="qTimerVal">0:00</span><span class="qbar-lbl">${hi ? 'इस प्रश्न पर' : 'This Question'}</span></div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${prog}%"></div></div></div>
    <div class="answered-tracker">${trackerHTML}</div>
    <div class="question-body">
      ${pyqBanner}
      <div class="q-meta">
        <span class="q-num">Q.${state.current+1}</span>
        <span class="q-subject-badge" style="background:${sColor.bg};color:${sColor.color}">${getSubject(q)}</span>
        <span class="diff-badge ${diffClass}">${q.difficulty.charAt(0).toUpperCase()+q.difficulty.slice(1)}</span>
      </div>
      <div class="question-text">${questionLines}</div>
      <div class="options">${optionsHTML}</div>

// ── RESULTS SCREEN ────────────────────────────────────────────────────────────
function renderResults(){
  const total = state.questions.length;
  const correct = state.questions.filter(q => state.answers[q.id] !== undefined && state.answers[q.id] !== null && state.answers[q.id] === q.answer).length;
  const wrong = state.questions.filter(q => state.answers[q.id] !== undefined && state.answers[q.id] !== null && state.answers[q.id] !== q.answer).length;

  const finalScore = (correct * 2) - (wrong * 0.66);
  const maxScore = total * 2;

  const rank = pct >= 80 ? {label:'IAS Calibre 🏆', cls:'rank-gold', desc:'Outstanding performance! You are in the top percentile of UPSC aspirants.'}

             : pct >= 45 ? {label:'Serious Aspirant 📚', cls:'rank-orange', desc:'Good foundation. Focus on weak areas and revise previous year patterns.'}
             :             {label:'Keep Preparing 💪', cls:'rank-muted', desc:'UPSC is a marathon, not a sprint. Identify gaps and build systematically.'};

  const reviewHTML = state.questions.map((q,i) => {
    const ans = state.answers[q.id];
    const isSkipped = !state.answers.hasOwnProperty(q.id) || ans === null;
    const isCorrect = !isSkipped && ans === q.answer;
    const isWrong = !isSkipped && ans !== q.answer;
    const sColor = SUBJ_COLORS[q.subjectClass];
    const optLetters = ['A','B','C','D'];
    const hdrClass = isCorrect ? 'correct-h' : isWrong ? 'wrong-h' : 'skipped-h';
    const resultIcon = isCorrect ? '✅' : isWrong ? '❌' : '⏭️';
    const pyqTag = q.pyq ? `<span class="pyq-mini-badge">📄 UPSC CSE — ${q.pyqYear}</span>` : '';
    const questionLines = getQ(q).split('\n').map(l=>l.trim()).filter(Boolean).join(' ');
    const timeSpent = state.qTimeSecs[q.id] || 0;
    const timeTag = `<span class="q-time-spent">⏱ ${fmtTime(timeSpent)}</span>`;

    let userAnswerHTML = '';
    if(isSkipped) userAnswerHTML = `<div class="ar-item"><label>Your Answer</label><span class="ar-skip">Not Attempted</span></div>`;
    else userAnswerHTML = `<div class="ar-item"><label>Your Answer</label><span class="${isCorrect?'ar-correct':'ar-wrong'}">${optLetters[ans]}. ${getOpts(q)[ans]}</span></div>`;

    return `<div class="review-item ${q.pyq ? 'pyq-item' : ''}">
      <div class="review-header ${hdrClass}">
        <span class="ri-num">Q.${i+1}</span>
        <div style="flex:1">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px">
            <span class="q-subject-badge" style="background:${sColor.bg};color:${sColor.color};font-size:11px;padding:2px 8px;border-radius:3px;font-weight:700;letter-spacing:1px;text-transform:uppercase">${getSubject(q)}</span>
            ${pyqTag}${timeTag}
          </div>
          <div class="ri-q${quizLang==='hi' ? ' hi-q' : ''}">${questionLines}</div>
        </div>
        <span class="ri-result">${resultIcon}</span>
      </div>
      <div class="review-body">
        <div class="answer-row">
          ${userAnswerHTML}
          <div class="ar-item"><label>Correct Answer</label><span class="ar-correct">${optLetters[q.answer]}. ${getOpts(q)[q.answer]}</span></div>
        </div>
        <div class="explanation-box">
          <strong>📖 Explanation</strong>
          ${getExplanation(q)}
        </div>
      </div>
    </div>`;
  }).join('');

  // Time summary grid
  const timeSummaryHTML = `<div class="time-summary-box">
    <h4>⏱ Time Spent Per Question</h4>
    <div class="time-summary-grid">
      ${state.questions.map((q,i) => `
        <div class="tsg-item">
          <div class="tsq">Q.${i+1}</div>
          <div class="tst">${fmtTime(state.qTimeSecs[q.id] || 0)}</div>
        </div>`).join('')}
    </div>
  </div>`;

  return `<div class="card fade-up">
    <div class="results-header">
      <h2>📊 Your Result Report</h2>
      <p>UPSC Civil Services Prelims — Mock Assessment</p>
    </div>
    <div class="score-display">
      <div class="score-ring">
        <div class="sr-num">${finalScore.toFixed(1)}</div>
        <div class="sr-denom">/ ${maxScore} marks</div>
      </div>
      <div class="score-stats">
        <div class="ss-item ss-green"><div class="ss-val">${correct}</div><div class="ss-lbl">Correct</div></div>
        <div class="ss-item ss-red"><div class="ss-val">${wrong}</div><div class="ss-lbl">Wrong</div></div>
        <div class="ss-item ss-orange"><div class="ss-val">${skipped}</div><div class="ss-lbl">Skipped</div></div>
        <div class="ss-item ss-blue"><div class="ss-val">${pct}%</div><div class="ss-lbl">Accuracy</div></div>
      </div>
    </div>
    <div class="rank-banner ${rank.cls}">
      <div class="rank-title">${rank.label}</div>
      <p>${rank.desc}</p>
    </div>
    <div class="review-title">📋 Detailed Answer Review with Explanations</div>
    ${timeSummaryHTML}
    ${reviewHTML}
    <div class="result-actions">
      <button class="btn-replay" onclick="startQuiz()">🔄 Attempt Again</button>
    </div>
  </div>`;
}

// ── LOGIC ─────────────────────────────────────────────────────────────────────
function calcScore(){
  let score = 0;
  state.questions.forEach(q => {
    const ans = state.answers[q.id];
    if(ans === undefined || ans === null) return;
    if(ans === q.answer) score += 2;
    else score -= 0.66;
  });
  return score;
}

function startQuiz(){
  stopMainTimer();
  stopQTimer();
  state = {
    screen:'quiz',
    questions: shuffle(QUESTIONS),
    current: 0,
    answers: {},
    mainSecsLeft: 30 * 60,
    qTimeSecs: {},
    mainTimerInterval: null,
    qTimerInterval: null,
    qTimerStart: null,
  };
  render();
  // Start timers after render
  setTimeout(()=>{
    startMainTimer();
    startQTimer(state.questions[0].id);
  }, 50);
}

function selectAnswer(qId, optIdx){
  state.answers[qId] = optIdx;
  // Re-render but preserve timer — update DOM directly to avoid timer reset
  const app = document.getElementById('app');
  app.innerHTML = renderQuiz();
  // Restart q timer display (interval continues from state)
  startQTimer(qId);
}

function skipQuestion(qId){
  stopQTimer();
  state.answers[qId] = null;
  if(state.current === state.questions.length - 1){
    showEndModal();
  } else {
    state.current++;
    render();
    startQTimer(state.questions[state.current].id);
  }
}

function jumpTo(idx){
  stopQTimer();
  state.current = idx;
  render();
  startQTimer(state.questions[idx].id);
}

function nextQuestion(){
  const isLast = state.current === state.questions.length - 1;
  stopQTimer();
  if(isLast){
    showEndModal();
  } else {
    state.current++;
    render();
    startQTimer(state.questions[state.current].id);
  }
}

// ── END-OF-QUIZ MODAL ─────────────────────────────────────────────────────────
function showEndModal(){
  const total = state.questions.length;
  const attempted = state.questions.filter(q => state.answers.hasOwnProperty(q.id) && state.answers[q.id] !== null).length;
  // Questions not yet visited or explicitly skipped
  const skippedQs = state.questions.filter((q,i) => !state.answers.hasOwnProperty(q.id) || state.answers[q.id] === null);
  const unansweredCount = skippedQs.length;
  const leftToVisit = state.questions.filter(q => !state.answers.hasOwnProperty(q.id)).length;

  const skippedPills = skippedQs.map(q => {
    const idx = state.questions.indexOf(q);
    return `<span class="skipped-pill" onclick="closeModalAndGoto(${idx})" style="cursor:pointer" title="Go to Q${idx+1}">Q${idx+1}</span>`;
  }).join('');

  const skippedBlock = unansweredCount > 0 ? `
    <div class="skipped-pill-list">${skippedPills}</div>` : '';

  const goSkippedBtn = unansweredCount > 0 ? `
    <button class="mbtn mbtn-skipped" onclick="goToFirstSkipped()">
      <span class="mbtn-icon">↩️</span>
      <div class="mbtn-text">Go to Skipped Questions
        <span>${unansweredCount} question${unansweredCount>1?'s':''} pending — click to attempt them</span>
      </div>
    </button>` : '';

  const html = `<div class="modal-overlay" id="endModal">
    <div class="modal-box">
      <div class="modal-header" style="color:white">
        <span class="modal-icon">📋</span>
        <h3>Ready to Submit?</h3>
        <p>You've reached the end of the question set</p>
        <div class="modal-stats">
          <div class="modal-stat ms-answered"><div class="ms-val">${attempted}</div><div class="ms-lbl">Answered</div></div>
          <div class="modal-stat ms-skipped"><div class="ms-val">${unansweredCount}</div><div class="ms-lbl">Skipped</div></div>
          <div class="modal-stat ms-left"><div class="ms-val">${total}</div><div class="ms-lbl">Total</div></div>
        </div>
      </div>
      <div class="modal-body">
        ${unansweredCount > 0 ? `<p>You have <strong>${unansweredCount} unanswered question${unansweredCount>1?'s':''}</strong>. Skipped questions carry no negative marks, but attempting them could improve your score.</p>${skippedBlock}` : '<p>You have answered all questions. Ready to see your results?</p>'}
        <div class="modal-actions">
          <button class="mbtn mbtn-finish" onclick="finishQuiz()">
            <span class="mbtn-icon">🏁</span>
            <div class="mbtn-text">Submit & See Results
              <span>End the test and view your detailed answer review</span>
            </div>
          </button>
          ${goSkippedBtn}
          <button class="mbtn mbtn-back" onclick="closeModal()">
            <span class="mbtn-icon">←</span>
            <div class="mbtn-text">Continue Quiz
              <span>Go back and review your answers before submitting</span>
            </div>
          </button>
        </div>
      </div>
    </div>
  </div>`;

  const container = document.getElementById('modal-container');
  if(container) container.innerHTML = html;
}

function closeModal(){
  const container = document.getElementById('modal-container');
  if(container) container.innerHTML = '';
}

function closeModalAndGoto(idx){
  closeModal();
  state.current = idx;
  render();
}

function goToFirstSkipped(){
  const firstSkipped = state.questions.findIndex(q => !state.answers.hasOwnProperty(q.id) || state.answers[q.id] === null);
  if(firstSkipped !== -1){
    state.current = firstSkipped;
    closeModal();
    render();
    startQTimer(state.questions[firstSkipped].id);
  }
}

function finishQuiz(){
  stopMainTimer();
  stopQTimer();
  const overlay = document.querySelector('.timeup-overlay');
  if(overlay) overlay.remove();
  closeModal();
  const display = document.getElementById('mainTimerDisplay');
  if(display) display.style.display = 'none';
  state.screen = 'results';
  render();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
